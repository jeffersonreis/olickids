eyebrow: Nossa história
heading: Nascida do amor de uma família.
paragraph1: >-
  A **Olic Kids** nasceu do amor de duas mães, **Jenifer** e **Emanuelle**, e
  leva no nome a união dos seus dois filhos: *Oliver* e *Jack*.
paragraph2: >-
  Cada peça é pensada como um abraço: feita pra aquecer, durar e crescer junto
  com a criança. O dachshund da família virou o nosso mascote: pequeno, leal e
  cheio de personalidade, ele representa o carinho que a gente coloca em tudo o
  que faz.
quote: '"Feita da nossa família, para a sua."'
