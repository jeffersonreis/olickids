eyebrow: Por que vestir Olic
heading: Conforto pensado nos mínimos detalhes
items:
  - icon: thermo
    title: Aquece sem pesar
    text: Tecido térmico leve que segura o calor sem atrapalhar a brincadeira.
  - icon: feather
    title: Toque macio e confortável
    text: Maciez suave na pele, sem etiquetas que incomodam o dia todo.
  - icon: shield
    title: Protege do frio
    text: Uma camada extra de aconchego para os dias mais gelados.
  - icon: wash
    title: Fácil de lavar e durável
    text: "Mantém a cor e a maciez lavada após lavada, peça após peça."
